<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udemy: Online course for skills, careers and AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============= Navigational bar ============= -->
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container-fluid ms-3 mt-1 mb-1">
            <!-- Logo -->
            <a class="navbar-brand" href="#">
                <img src="/images/logo-udemy.svg" width="90" height="34" alt="Udemy logo">
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- Left Side List -->
                <ul class="navbar-nav mb-2 mb-lg-0 d-flex justify-content-center align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-items" href="#">Find Courses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-items" href="#">Get Certified</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-items" href="#">Subscribed</a>
                    </li>
                </ul>

                <!-- Search Bar -->
                <i class="fa-brands fa-sistrix position-relative search-icon"></i>
                <form class="d-flex search col-lg-4 ms-2 me-2" role="search">
                    <input class="form-control me-2 border-black rounded-pill input" type="search"
                        placeholder="Search for anything" aria-label="Search" />
                </form>

                <!-- Right Side List & Buttons -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex justify-content-center align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-items" href="#">Udemy Business</a>
                    </li>
                    <li class="nav-item">
                        <i class="fa-solid fa-cart-shopping ms-1 me-1"></i>
                    </li>
                    <li class="nav-item">
                        <button type="button" class="btn btn-outline-dark me-2 ms-2 login-btn">Log in</button>
                    </li>
                    <li class="nav-item">
                        <button type="button" class="btn btn-dark signup-btn">Sign up</button>
                    </li>
                    <li class="nav-item">
                        <button type="button" class="btn btn-outline-dark me-2 ms-2 login-btn"><i
                                class="fa-solid fa-globe"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!--==================== Hero Section ================== -->
    <div class="card text-bg-dark border-0 rounded-0">
        <img src="./images/Hero-image.png" class="card-img border-0 rounded-0" alt="...">
        <div class="col-sm-6 ms-sm-2 mt-sm-2 col-md-5 ms-md-3 mt-md-3 col-lg-4 ms-lg-5 mt-lg-5 mb-3 mb-sm-0 hero-card card-img-overlay">
            <div class="card ps-2 pt-2 pb-2 border-0 rounded-0 hero-card-body">
                <div class="card-body">
                    <h2 class="card-title hero-title">Start learning today!</h2>
                    <p class="card-text hero-text">Exclusive Affiliate discount with courses starting at $11.99</p>
                </div>
            </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
